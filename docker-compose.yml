services:
  app:
    build:
      context: .
      target: production
    container_name: aivacol-fleet-api

    env_file:
      - .env

    environment:
      PORT: 3000
      DB_HOST: sqlserver
      DB_PORT: 1433
      REDIS_HOST: redis
      REDIS_PORT: 6379

    ports:
      - '3000:3000'

    depends_on:
      - sqlserver
      - redis

    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aivacol-sqlserver

    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'Aivacol@123'

    ports:
      - '1433:1433'

    volumes:
      - sqlserver_data:/var/opt/mssql

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aivacol-redis

    ports:
      - '6379:6379'

    restart: unless-stopped

volumes:
  sqlserver_data:
