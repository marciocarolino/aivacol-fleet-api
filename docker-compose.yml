services:
  app:
    build:
      context: .
      target: production
    container_name: aivacol-fleet-api

    env_file:
      - .env

    environment:
      PORT: 3000
      DB_HOST: sqlserver
      DB_PORT: 1433
      REDIS_HOST: redis
      REDIS_PORT: 6379

    ports:
      - '3000:3000'

    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy

    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aivacol-sqlserver

    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'Aivacol@123'

    ports:
      - '1433:1433'

    volumes:
      - sqlserver_data:/var/opt/mssql

    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1" -C || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aivacol-redis

    ports:
      - '6379:6379'

    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 3s
      retries: 10

    restart: unless-stopped

volumes:
  sqlserver_data:
